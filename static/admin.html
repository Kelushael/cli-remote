<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CLI Remote Admin</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f;color:#e0e0e0;font-family:monospace;min-height:100vh;padding:20px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #333}h1{color:#f5a623}.sessions{display:flex;gap:10px}.session-chip{padding:8px 16px;border-radius:20px;font-size:.8rem;cursor:pointer}.session-chip.approved{background:rgba(0,255,136,.2);border:1px solid #0f8;color:#0f8}.session-chip.selected{box-shadow:0 0 15px currentColor}.terminal{background:#111;border:1px solid #333;border-radius:8px;height:calc(100vh - 150px);display:flex;flex-direction:column}#output{flex:1;padding:15px;overflow-y:auto}.cmd{color:#f5a623;margin-top:10px}.out{color:#0f8;white-space:pre-wrap}.sys{color:#666}.input-area{display:flex;border-top:1px solid #333}.prompt{padding:15px;color:#f5a623;background:#1a1a1a}#command-input{flex:1;background:#1a1a1a;border:none;color:#e0e0e0;padding:15px;font-family:inherit;font-size:1rem;outline:none}#send-btn{background:#f5a623;color:#0a0a0f;border:none;padding:15px 25px;cursor:pointer;font-weight:700}#send-btn:disabled{background:#333}</style></head><body><div class="header"><h1>CLI Remote Admin</h1><div class="sessions" id="sessions"><span style="color:#666">No clients</span></div></div><div class="terminal"><div id="output"><div class="sys">Waiting for client...</div></div><div class="input-area"><span class="prompt">$</span><input type="text" id="command-input" placeholder="Enter command..." disabled><button id="send-btn" onclick="sendCommand()" disabled>SEND</button></div></div><script>let ws,selectedSession=null,sessions={};function init(){const p=location.protocol==="https:"?"wss:":"ws:";ws=new WebSocket(p+"//"+location.host+"/ws/admin");ws.onopen=()=>appendOutput("Connected","sys");ws.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==="session_list")d.sessions.forEach(s=>sessions[s.session_id]=s);if(d.type==="client_connected"){sessions[d.session_id]={session_id:d.session_id,approved:!1};appendOutput("Client: "+d.session_id,"sys")}if(d.type==="session_approved"){if(sessions[d.session_id])sessions[d.session_id].approved=!0;updateUI();if(Object.keys(sessions).length===1)selectSession(d.session_id)}if(d.type==="client_disconnected"){delete sessions[d.session_id];if(selectedSession===d.session_id){selectedSession=null;document.getElementById("command-input").disabled=!0;document.getElementById("send-btn").disabled=!0}}if(d.type==="command_output"&&d.session_id===selectedSession)appendOutput(d.output,"out");updateUI()};document.getElementById("command-input").addEventListener("keypress",e=>{if(e.key==="Enter")sendCommand()})}function updateUI(){const c=document.getElementById("sessions"),k=Object.keys(sessions);if(!k.length){c.innerHTML="<span style=\"color:#666\">No clients</span>";return}c.innerHTML=k.map(s=>{const a=sessions[s].approved?"approved":"";const sel=s===selectedSession?"selected":"";return"<div class=\"session-chip "+a+" "+sel+"\" onclick=\"selectSession(\'"+s+"\')\">"+s+"</div>"}).join("")}function selectSession(s){if(!sessions[s]?.approved)return;selectedSession=s;document.getElementById("command-input").disabled=!1;document.getElementById("send-btn").disabled=!1;document.getElementById("command-input").focus();updateUI();appendOutput("Selected: "+s,"sys")}function sendCommand(){const i=document.getElementById("command-input"),c=i.value.trim();if(!c||!selectedSession)return;ws.send(JSON.stringify({type:"command",session_id:selectedSession,command:c}));appendOutput("$ "+c,"cmd");i.value=""}function appendOutput(t,c){const o=document.getElementById("output"),l=document.createElement("div");l.className=c;l.textContent=t;o.appendChild(l);o.scrollTop=o.scrollHeight}init()</script></body></html>
