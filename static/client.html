<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CLI Remote</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f;color:#e0e0e0;font-family:monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}.container{max-width:600px;width:100%;text-align:center}h1{color:#f5a623;margin-bottom:10px;font-size:2rem}.subtitle{color:#666;margin-bottom:40px}#connect-btn{background:linear-gradient(135deg,#f5a623,#e08e0b);color:#0a0a0f;border:none;padding:20px 60px;font-size:1.5rem;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit}#connect-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(245,166,35,.4)}#connect-btn:disabled{background:#333;cursor:not-allowed}.status{margin-top:30px;padding:15px;border-radius:8px;display:none}.status.connected{display:block;background:rgba(0,255,136,.1);border:1px solid #0f8;color:#0f8}.status.waiting{display:block;background:rgba(245,166,35,.1);border:1px solid #f5a623;color:#f5a623}#output{margin-top:30px;background:#111;border:1px solid #333;border-radius:8px;padding:20px;text-align:left;max-height:400px;overflow-y:auto;display:none}#output.active{display:block}.cmd{color:#f5a623}.out{color:#0f8}</style></head><body><div class="container"><h1>CLI Remote</h1><p class="subtitle">Secure remote terminal assistance</p><button id="connect-btn" onclick="connect()">CONNECT</button><div id="status" class="status"></div><div id="output"></div></div><script>let ws,sid,approved=!1;function connect(){const b=document.getElementById("connect-btn"),s=document.getElementById("status");b.disabled=!0;b.textContent="CONNECTING...";const p=location.protocol==="https:"?"wss:":"ws:";ws=new WebSocket(p+"//"+location.host+"/ws/client");ws.onopen=()=>{s.className="status waiting";s.textContent="Connected. Waiting for approval..."};ws.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==="session_created"){sid=d.session_id;ws.send(JSON.stringify({type:"approve"}));approved=!0;s.className="status connected";s.textContent="✓ Connected. Commands will appear below.";b.textContent="CONNECTED";document.getElementById("output").classList.add("active")}if(d.type==="command"){appendOutput("$ "+d.command,"cmd");executeCommand(d.command)}};ws.onclose=()=>{s.className="status";s.textContent="Disconnected.";b.disabled=!1;b.textContent="RECONNECT"}}function appendOutput(t,c){const o=document.getElementById("output"),l=document.createElement("div");l.className=c;l.textContent=t;o.appendChild(l);o.scrollTop=o.scrollHeight}async function executeCommand(c){try{const r=await fetch("http://localhost:9999/exec",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({command:c})});const d=await r.json();appendOutput(d.output,"out");ws.send(JSON.stringify({type:"output",output:d.output}))}catch(e){appendOutput("[Run cli-agent.py first]","out");ws.send(JSON.stringify({type:"output",output:"[Agent not running]"}))}}</script></body></html>
